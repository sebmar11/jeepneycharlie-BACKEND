<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Order - Jeepney Charlie</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --red: #c0392b;
    --yellow: #f5c518;
    --dark: #1a1a1a;
    --green: #27ae60;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f5f5;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    color: #111;
  }

  .receipt {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    max-width: 420px;
    width: 100%;
    overflow: hidden;
  }

  .receipt-header {
    background: var(--dark);
    color: #fff;
    padding: 1.5rem 1.5rem 1.2rem;
    text-align: center;
  }
  .receipt-header .brand { font-size: 0.75rem; font-weight: 700; letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; }
  .receipt-header h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; margin: 4px 0 0; }
  .receipt-header h1 span { color: var(--yellow); }

  .receipt-status {
    padding: 1.1rem 1.5rem;
    text-align: center;
    border-bottom: 2px dashed #eee;
  }
  .status-label {
    display: inline-block;
    padding: 6px 22px;
    border-radius: 999px;
    font-weight: 800;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.3rem;
  }
  .status-label.pending   { background: #fdebd0; color: #e67e22; }
  .status-label.preparing { background: #d6eaf8; color: #2980b9; }
  .status-label.ready     { background: #d5f5e3; color: #27ae60; font-size: 1rem; }
  .status-label.done      { background: #eaecee; color: #7f8c8d; }
  .status-label.awaiting_verification { background: #fff3cd; color: #856404; }

  .upload-section {
    padding: 1.4rem 1.5rem;
    border-top: 2px dashed #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    text-align: center;
  }
  .upload-section h3 { font-size: 1rem; font-weight: 800; color: #1a1a1a; }
  .upload-section p  { font-size: 0.82rem; color: #888; line-height: 1.5; }
  .upload-label {
    display: inline-block;
    background: #0060ad;
    color: #fff;
    font-weight: 800;
    font-size: 0.9rem;
    padding: 11px 28px;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .upload-label:hover { opacity: 0.85; }
  #screenshot-input { display: none; }
  #upload-preview {
    width: 100%;
    max-height: 180px;
    object-fit: contain;
    border-radius: 8px;
    border: 1px solid #ddd;
    display: none;
  }
  #upload-submit {
    display: none;
    background: #27ae60;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 28px;
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    width: 100%;
  }
  #upload-submit:hover { opacity: 0.85; }
  #upload-status { font-size: 0.85rem; font-weight: 700; }

  .waiting-banner {
    background: #fff8e1;
    border: 2px solid #f39c12;
    border-radius: 10px;
    padding: 0.9rem 1.2rem;
    font-size: 0.88rem;
    color: #856404;
    font-weight: 600;
    text-align: center;
    margin: 0 1.5rem 1rem;
  }
  .status-hint { font-size: 0.82rem; color: #888; margin-top: 2px; }

  .receipt-section {
    padding: 1.1rem 1.5rem;
    border-bottom: 1px solid #f0f0f0;
  }
  .receipt-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #aaa; margin-bottom: 0.3rem; }
  .receipt-value { font-size: 1rem; font-weight: 600; }
  .order-number-big { font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; color: var(--dark); }

  .receipt-items { padding: 1.1rem 1.5rem; border-bottom: 1px solid #f0f0f0; }
  .receipt-item { padding: 0.5rem 0; border-bottom: 1px dashed #f5f5f5; }
  .receipt-item:last-child { border-bottom: none; }
  .receipt-item-name { font-weight: 700; display: flex; justify-content: space-between; font-size: 0.95rem; }
  .receipt-item-addon { font-size: 0.8rem; color: #888; margin-top: 2px; }

  .receipt-total {
    padding: 1rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 1.1rem;
  }
  .receipt-total strong { font-size: 1.5rem; font-weight: 900; }

  .receipt-qr {
    padding: 1.2rem 1.5rem;
    border-top: 2px dashed #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }
  .receipt-qr p { font-size: 0.78rem; color: #aaa; text-align: center; }
  #qr-code canvas, #qr-code img { border-radius: 8px; }

  .receipt-footer {
    padding: 0.8rem 1.5rem 1.5rem;
    text-align: center;
    font-size: 0.78rem;
    color: #bbb;
  }

  .ready-banner {
    display: none;
    background: var(--green);
    color: #fff;
    text-align: center;
    padding: 0.8rem;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.5px;
  }
  .ready-banner.show { display: block; }

  .loading { text-align: center; padding: 4rem 1rem; color: #aaa; font-size: 1rem; }
  .error   { text-align: center; padding: 3rem 1rem; color: var(--red); }

  @media print {
    body { background: #fff; padding: 0; }
    .receipt { box-shadow: none; border-radius: 0; }
  }
</style>
</head>
<body>

<div class="receipt" id="receipt-wrap">
  <div class="loading">Loading your order…</div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const orderNumber = params.get('order');
  const API = '';

  let prevStatus = null;
  let prevPaymentStatus = null;
  let pollInterval = null;
  let errorCount = 0;

  async function loadOrder() {
    if (!orderNumber) {
      document.getElementById('receipt-wrap').innerHTML = '<div class="error">No order number provided.</div>';
      return;
    }
    try {
      const res = await fetch(`${API}/orders/${orderNumber}`);
      if (!res.ok) throw new Error('not found');
      const order = await res.json();
      errorCount = 0;

      if (order.status !== prevStatus || order.payment_status !== prevPaymentStatus) {
        prevStatus = order.status;
        prevPaymentStatus = order.payment_status;
        render(order);
      }
    } catch(e) {
      errorCount++;
      if (errorCount >= 3) {
        // Stop polling after 3 consecutive failures
        if (pollInterval) clearInterval(pollInterval);
        document.getElementById('receipt-wrap').innerHTML = `<div class="error">Order not found.<br><small>${orderNumber}</small><br><br><a href="/" style="color:#c0392b">Back to menu</a></div>`;
      }
    }
  }

  function statusHint(s) {
    return {
      pending:                'We received your order and will start soon.',
      preparing:              'Your order is being prepared now!',
      ready:                  'Head to the counter - your food is ready!',
      done:                   'Order completed. Thanks for dining with us!',
      awaiting_verification:  'Waiting for staff to verify your GCash payment.'
    }[s] || '';
  }

  function render(order) {
    const items = Array.isArray(order.items) ? order.items : JSON.parse(order.items);
    const isReady = order.status === 'ready';
    const isGcash = order.payment_method === 'gcash';
    const isAwaiting = order.status === 'awaiting_verification';
    // GCash: show QR only when payment_status === 'approved'
    const showQr = !isGcash || order.payment_status === 'approved';

    const itemsHtml = items.map(item => {
      const addons = item.addons && Object.keys(item.addons).length
        ? Object.entries(item.addons).filter(([,v]) => v > 0).map(([k,v]) => `+ ${k}${v > 1 ? ` x${v}` : ''}`).join('<br>')
        : '';
      return `
        <div class="receipt-item">
          <div class="receipt-item-name">${item.name} x${item.qty||1} <span>₱${(item.price*(item.qty||1)).toFixed(0)}</span></div>
          ${addons ? `<div class="receipt-item-addon">${addons}</div>` : ''}
        </div>`;
    }).join('');

    // Notes
    let pickupHtml = '', instructionsHtml = '';
    if (order.notes) {
      const parts = order.notes.split(' | ');
      const pickup = parts.find(p => p.startsWith('Pickup:'));
      const instructions = parts.filter(p => !p.startsWith('Pickup:')).join(' | ');
      if (pickup) pickupHtml = `<div class="receipt-section"><div class="receipt-label">Pickup Time</div><div class="receipt-value">${pickup.replace('Pickup: ','')}</div></div>`;
      if (instructions) instructionsHtml = `<div class="receipt-section" style="border-left:4px solid #c0392b;padding-left:1.1rem;"><div class="receipt-label" style="color:#c0392b;">⚠️ Special Instructions</div><div class="receipt-value" style="color:#c0392b;font-weight:700;">${instructions}</div></div>`;
    }

    // GCash upload section (shown when awaiting verification and no screenshot yet, or after rejection)
    const needsUpload = isGcash && (isAwaiting || order.payment_status === 'rejected');
    const rejectionBanner = order.payment_status === 'rejected' && order.rejection_reason ? `
      <div style="background:#fff0f0;border:2px solid #c0392b;border-radius:10px;padding:0.9rem 1.2rem;margin:0 1.5rem 1rem;font-size:0.88rem;color:#c0392b;font-weight:700;">
        ❌ Payment rejected: ${order.rejection_reason}<br>
        <span style="font-weight:600;color:#555;">Please re-upload a clear screenshot of your GCash payment.</span>
      </div>` : '';

    const uploadSection = needsUpload ? `
      ${rejectionBanner}
      <div class="upload-section">
        <h3>📤 Upload GCash Screenshot</h3>
        <p>Scan the QR below or send to <strong>09498850345</strong>, then upload your screenshot here.</p>
        <img src="/assets/gcash-qr.jpg" alt="GCash QR Code" style="width:180px;height:180px;object-fit:contain;border-radius:12px;border:2px solid #e0eaf8;background:#f7faff;padding:8px;" />
        <p style="font-size:0.78rem;color:#aaa;">GCash number: <strong style="color:#0060ad;">09498850345</strong></p>
        <img id="upload-preview" src="" alt="preview" />
        <label class="upload-label" for="screenshot-input">📷 Choose Screenshot</label>
        <input type="file" id="screenshot-input" accept="image/*" onchange="previewFile(this)" />
        <button id="upload-submit" onclick="submitScreenshot('${order.order_number}')">Submit for Verification</button>
        <div id="upload-status"></div>
      </div>` : '';

    // Waiting banner shown after upload, while staff hasn't approved yet
    const waitingBanner = isGcash && !needsUpload && isAwaiting ? `
      <div class="waiting-banner">⏳ Payment screenshot received! Waiting for staff to verify…</div>` : '';

    // QR section
    const qrSection = showQr ? `
      <div class="receipt-qr">
        <div id="qr-code"></div>
        <p>Show this QR code at the counter when picking up your order.</p>
      </div>` : '';

    document.getElementById('receipt-wrap').innerHTML = `
      <div class="ready-banner ${isReady?'show':''}">🔔 YOUR ORDER IS READY FOR PICKUP!</div>
      <div class="receipt-header">
        <div class="brand">Order Receipt</div>
        <h1>JEEPNEY <span>CHARLIE</span></h1>
      </div>
      <div class="receipt-status">
        <div class="status-label ${order.status}">${order.status === 'ready' ? '✓ Ready for Pickup' : statusLabel(order.status)}</div>
        <div class="status-hint">${statusHint(order.status)}</div>
      </div>
      <div class="receipt-section">
        <div class="receipt-label">Order Number</div>
        <div class="order-number-big">${order.order_number}</div>
      </div>
      <div class="receipt-section">
        <div class="receipt-label">Name</div>
        <div class="receipt-value">${order.customer_name}</div>
      </div>
      <div class="receipt-items">${itemsHtml}</div>
      ${pickupHtml}${instructionsHtml}
      <div class="receipt-total">Total <strong>₱${parseFloat(order.total).toFixed(0)}</strong></div>
      ${uploadSection}
      ${waitingBanner}
      ${qrSection}
      <div class="receipt-footer">
        Ordered at ${new Date(order.created_at).toLocaleString('en-PH', {hour:'2-digit',minute:'2-digit',month:'short',day:'numeric'})}<br>
        Thank you for ordering from Jeepney Charlie!
      </div>
    `;

    if (showQr) {
      new QRCode(document.getElementById('qr-code'), {
        text: order.order_number,
        width: 160,
        height: 160,
        colorDark: '#1a1a1a',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    }
  }

  function statusLabel(s) {
    return {
      pending: 'Pending',
      preparing: 'Preparing',
      ready: 'Ready for Pickup',
      done: 'Done',
      awaiting_verification: '⏳ Awaiting Payment Verification'
    }[s] || s.charAt(0).toUpperCase() + s.slice(1);
  }

  function previewFile(input) {
    const file = input.files[0];
    if (!file) return;
    const preview = document.getElementById('upload-preview');
    const submit  = document.getElementById('upload-submit');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    submit.style.display  = 'block';
  }

  async function submitScreenshot(orderNumber) {
    const input = document.getElementById('screenshot-input');
    const statusEl = document.getElementById('upload-status');
    const submitBtn = document.getElementById('upload-submit');
    if (!input.files[0]) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Uploading…';
    statusEl.textContent = '';

    const formData = new FormData();
    formData.append('screenshot', input.files[0]);

    try {
      const BACKEND = 'https://jeepneycharlie-backend-production.up.railway.app';
      const res = await fetch(`${BACKEND}/orders/${orderNumber}/screenshot`, {
        method: 'POST',
        body: formData
      });
      if (!res.ok) throw new Error('Upload failed');
      statusEl.style.color = '#27ae60';
      statusEl.textContent = '✓ Screenshot submitted! Waiting for staff to verify…';
      submitBtn.style.display = 'none';
      // Reload order state after a moment
      setTimeout(loadOrder, 1500);
    } catch(e) {
      statusEl.style.color = '#c0392b';
      statusEl.textContent = 'Upload failed. Please try again.';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit for Verification';
    }
  }

  loadOrder();
  pollInterval = setInterval(loadOrder, 8000);
</script>
</body>
</html>
